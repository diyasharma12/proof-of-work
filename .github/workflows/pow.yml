name: Update Proof of Work

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch PRs
        run: |
          curl -s "https://api.github.com/search/issues?q=author:YOUR_USERNAME+org:calcom+type:pr&per_page=50" > prs.json

      - name: Generate Table
        run: |
          echo "## 🚀 Proof of Work" > README.md
          echo "" >> README.md
          echo "My open-source contributions to public organizations." >> README.md
          echo "" >> README.md

          TOTAL=$(jq '.total_count' prs.json)
          MERGED=$(jq '[.items[] | select(.pull_request.merged_at != null)] | length' prs.json)

          echo "Total PRs: $TOTAL | Merged PRs: $MERGED" >> README.md
          echo "" >> README.md

          echo "### Organization: calcom" >> README.md
          echo "" >> README.md

          echo "| Repository | PR Title | Status | Created At | Merged At | Link |" >> README.md
          echo "|-----------|----------|--------|------------|-----------|------|" >> README.md

          jq -r '.items[] | [
            (.repository_url | split("/")[-1]),
            .title,
            (if .pull_request.merged_at then "Merged" else "Open" end),
            .created_at,
            (.pull_request.merged_at // "-"),
            .html_url
          ] | "| \(.[0]) | \(.[1]) | \(.[2]) | \(.[3]) | \(.[4]) | [Link](\(.[5])) |"' prs.json >> README.md

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update Proof of Work" || echo "No changes"
          git push
